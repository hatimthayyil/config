name: "Setup Nix with niks3 cache"
description: "Install Nix and configure it to use and push to niks3"

inputs:
  nixbuild_token:
    description: "nixbuild.net auth token"
    required: true
  niks3-skip-push:
    description: "Configure the niks3 substituter only; do not push build outputs"
    default: 'false'

runs:
  using: composite
  steps:
    # Single-user Nix (no daemon): remote builds run in the step's own
    # environment, which nixbuild-action's SSH config and token require.
    - uses: nixbuild/nix-quick-install-action@v35
    # The flake is the single source of truth for caches (modules/
    # infrastructure/caches.nix); the runner, nixbuild.net, and eagle all
    # consume the same list.
    - id: caches
      shell: bash
      run: |
        caches="$(nix eval --json .#lib.caches)"
        substituters="$(jq -r '.substituters | join(" ")' <<< "$caches")"
        keys="$(jq -r '."trusted-public-keys" | join(" ")' <<< "$caches")"
        {
          echo "substituters=$substituters"
          echo "trusted-public-keys=$keys"
        } >> "$GITHUB_OUTPUT"
        {
          echo 'NIX_CONFIG<<EOF'
          echo "substituters = $substituters"
          echo "trusted-public-keys = $keys"
          echo 'EOF'
        } >> "$GITHUB_ENV"
    - uses: Mic92/niks3-action@v1
      with:
        server-url: https://niks3.thayyil.workers.dev
        drain-timeout: 1800
        skip-push: ${{ inputs.niks3-skip-push }}
    - uses: nixbuild/nixbuild-action@v25
      with:
        nixbuild_token: ${{ inputs.nixbuild_token }}
        settings: |
          substituters = ${{ steps.caches.outputs.substituters }}
          trusted-public-keys = ${{ steps.caches.outputs.trusted-public-keys }}
    # nixbuild-action only advertises x86_64/aarch64 builders, but the
    # system closure also needs i686-linux builds, which nixbuild.net
    # supports on the same host.
    - shell: bash
      run: |
        conf="${NIX_CONFIG#include }"
        builders_file="$(sed -n 's/^builders = @//p' "$conf")"
        echo "nixbuild i686-linux - 200 1 big-parallel,benchmark,kvm,nixos-test" >> "$builders_file"
