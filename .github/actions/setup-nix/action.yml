name: "Setup Nix with niks3 cache"
description: "Install Nix and configure it to use and push to niks3"

inputs:
  nixbuild_token:
    description: "nixbuild.net auth token"
    required: true

runs:
  using: composite
  steps:
    # Single-user Nix (no daemon): remote builds run in the step's own
    # environment, which nixbuild-action's SSH config and token require.
    - uses: nixbuild/nix-quick-install-action@v35
      with:
        nix_conf: |
          substituters = https://cache.nixos.org https://nix-community.cachix.org https://helix.cachix.org https://cache.thalheim.io
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= helix.cachix.org-1:ejp9KQpR1FBI2onstMQ34yogDm4OgU2ru6lIwPvuCVs= cache.thalheim.io-1:R7msbosLEZKrxk/lKxf9BTjOOH7Ax3H0Qj0/6wiHOgc=
    - uses: Mic92/niks3-action@v1
      with:
        server-url: https://niks3.thayyil.workers.dev
        drain-timeout: 1800
    - uses: nixbuild/nixbuild-action@v25
      with:
        nixbuild_token: ${{ inputs.nixbuild_token }}
    # nixbuild-action only advertises x86_64/aarch64 builders, but the
    # system closure also needs i686-linux builds, which nixbuild.net
    # supports on the same host.
    - shell: bash
      run: |
        conf="${NIX_CONFIG#include }"
        builders_file="$(sed -n 's/^builders = @//p' "$conf")"
        echo "nixbuild i686-linux - 200 1 big-parallel,benchmark,kvm,nixos-test" >> "$builders_file"
