[project]
name = "nix-config"
revision = "1.0"
require_reason = "agents"

[profiles.default]
# CLOUDFLARE_API_TOKEN = { description = "Cloudflare API token used by Wrangler to deploy the Niks3 Worker and Container", required = true }
CLOUDFLARE_ACCOUNT_ID = { description = "Cloudflare account ID that owns the Niks3 deployment", required = true }
NIKS3_DB = { description = "Neon PostgreSQL connection string for Niks3", required = true }
NIKS3_S3_ENDPOINT = { description = "Cloudflare R2 S3 endpoint for the niks3 bucket", required = true }
NIKS3_S3_ACCESS_KEY = { description = "R2 S3 access key with read/write access limited to the niks3 bucket", required = true }
NIKS3_S3_SECRET_KEY = { description = "R2 S3 secret key with read/write access limited to the niks3 bucket", required = true }
NIKS3_API_TOKEN = { description = "Niks3 bearer token for authenticated uploads and administration", required = true }
NIKS3_SIGN_KEY = { description = "Nix cache Ed25519 secret signing key", required = true }
NIKS3_CACHE_URL = { description = "Public R2 custom-domain URL used by Nix clients to read the cache", required = true }
